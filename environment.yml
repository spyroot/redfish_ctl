# Conda development environment for redfish_ctl.
#
# Create:   conda env create -f environment.yml
# Update:   conda env update -f environment.yml --prune
# Activate: conda activate redfish_ctl
#
# Runtime deps mirror requirements.txt; the rest are dev/test tooling.
name: redfish_ctl
channels:
  - conda-forge
dependencies:
  - python>=3.10
  - pip
  # Runtime
  - requests>=2.28
  - urllib3>=1.26,<2
  - tqdm>=4.61
  - pygments>=2.14
  - pyyaml>=6.0
  # Test + lint tooling
  - pytest>=7
  - requests-mock>=1.10
  - ruff
  - mypy
  - twine
  # numpy powers the discovery crawl's rest_api_map.npy output (setup.py "discovery"
  # and "dev" extras; imported by discovery/cmd_discovery.py). Optional at runtime but
  # REQUIRED to collect the discovery/corpus tests, so this conda toolbox env matches
  # GitHub CI's `pip install -e .[dev]` instead of the bare `-e .` below.
  - numpy
  # Schema validation (tools/redfish_validate.py)
  - jsonschema>=4.18
  - referencing
  # Optional TUI ("tui" extra in setup.py): pretty tables for redfish-discover.
  - rich>=13
  - pip:
      # Install redfish_ctl itself (and anything not on conda-forge) via pip.
      - -e .
      # OTLP span/metric exporter (mirrors setup.py extras_require["otlp"]) so the
      # container image can emit traces to Splunk without a start-time install.
      # The Dockerfile strips only the "- -e ." line, so this survives into the
      # built conda env; agent containers then run redfish_ctl --otlp-traces.
      - opentelemetry-exporter-otlp-proto-http>=1.20
