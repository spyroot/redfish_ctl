# Gate registry — the single source of truth for every mandatory gate.
# Each gate has an ID, a PROFILE (when it runs), a COMMAND (the executable script), a REQUIRED flag,
# and a MUTATES classification. CI (GitLab/GitHub) and scripts/gates/run.sh <profile> run gates from
# here; tools/gate_meta.py (the meta-gate) enforces the invariants below and FAILS when:
#   - a required gate's command does not exist or is not executable
#   - a mandatory gate ID is absent from this file
#   - a GitLab job uses allow_failure:true, or a CI job lacks the `homelab-k8s` runner tag
#   - a module under modules/ lacks validate/plan/apply/verify/rollback
#   - an apply job exists without verification AND rollback
#   - a live apply (mutates:true) gate is reachable in a merge-request pipeline
#
# Profiles: merge (pre-merge, no cluster, no mutation) | integration (needs cluster, no mutation)
#           | deploy (live apply, may mutate). runner_tag: every CI job carries `homelab-k8s`.
runner_tag: homelab-k8s

mandatory_ids:
  - repo.shellcheck
  - repo.docstring
  - repo.pytest
  - repo.http_bypass
  - kubernetes.render
  - repo.meta

gates:
  - id: repo.shellcheck
    profile: merge
    command: scripts/gates/repository/shellcheck.sh
    required: true
    mutates: false
  - id: repo.docstring
    profile: merge
    command: scripts/gates/repository/docstring.sh
    required: true
    mutates: false
  - id: repo.pytest
    profile: merge
    command: scripts/gates/repository/pytest.sh
    required: true
    mutates: false
  - id: repo.http_bypass
    profile: merge
    command: scripts/gates/repository/http_bypass.sh
    required: true
    mutates: false
  - id: repo.meta
    profile: merge
    command: scripts/gates/meta.sh
    required: true
    mutates: false
  - id: kubernetes.render
    profile: merge
    command: scripts/gates/kubernetes/render.sh
    required: true
    mutates: false
  - id: integration.namespace
    profile: integration
    command: scripts/gates/integration/namespace-test.sh
    required: true
    mutates: false
  - id: deploy.verify
    profile: deploy
    command: scripts/gates/deploy/verify.sh
    required: true
    mutates: true
