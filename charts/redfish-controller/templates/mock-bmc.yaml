{{- if .Values.mockBmc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redfish-controller.mockBmcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redfish-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-bmc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "redfish-controller.mockBmcName" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "redfish-controller.mockBmcName" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mock-bmc
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: mock-bmc
          image: {{ include "redfish-controller.mockBmcImage" . }}
          imagePullPolicy: {{ .Values.mockBmc.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MOCK_BMC_CORPUS_DIR
              value: {{ .Values.mockBmc.corpusDir | quote }}
          readinessProbe:
            httpGet:
              path: /redfish/v1/
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /redfish/v1/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.mockBmc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redfish-controller.mockBmcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redfish-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-bmc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "redfish-controller.mockBmcName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
