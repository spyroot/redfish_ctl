# Fixture-to-signal mapping for the M2 gap-closure gate (see gates.md).
# The gate computes (expected signals - emitted signals) over these rows and
# requires the difference to be empty. State metrics follow the M1 model:
# one-hot value 1 with a normalized, allowlisted lowercase label; unknown
# vendor values map to "unknown", never dropped, never free-form.
signals:
  - source_property: Status.Health
    input: "OK"
    expected: {metric: hw.component.health, labels: {health: ok}, value: 1}
  - source_property: Status.Health
    input: "Warning"
    expected: {metric: hw.component.health, labels: {health: warning}, value: 1}
  - source_property: Status.Health
    input: "Critical"
    expected: {metric: hw.component.health, labels: {health: critical}, value: 1}
  - source_property: Status.Health
    input: "SomeVendorValue"
    expected: {metric: hw.component.health, labels: {health: unknown}, value: 1}
  - source_property: Status.HealthRollup
    input: "Warning"
    expected: {metric: hw.component.health_rollup, labels: {health: warning}, value: 1}
  - source_property: Status.State
    input: "Enabled"
    expected: {metric: hw.component.state, labels: {state: enabled}, value: 1}
  - source_property: Status.State
    input: "Absent"
    expected: {metric: hw.component.state, labels: {state: absent}, value: 1}
  - source_property: Status.State
    input: "StandbyOffline"
    expected: {metric: hw.component.state, labels: {state: standby_offline}, value: 1}
  - source_property: LinkDownReasonCode
    input: "PeerResetEvent"
    expected: {metric: hw.fabric.link_down_reason, labels: {reason: peer_reset_event}, value: 1}
  - source_property: EDPViolationState
    input: "Normal"
    expected: {metric: hw.power.edp_violation_state, labels: {state: normal}, value: 1}
  - source_property: EDPViolationState
    input: "Asserted"
    expected: {metric: hw.power.edp_violation_state, labels: {state: asserted}, value: 1}
  - source_property: PowerBreakPerformanceState
    input: "Active"
    expected: {metric: hw.power.break_performance_state, labels: {state: active}, value: 1}
  - source_property: LastResetType
    input: "PF_FLR"
    expected: {metric: hw.component.last_reset_type, labels: {reset_type: pf_flr}, value: 1}

# Per-BMC scrape-health self-signals. Unlike the categorical `signals` rows above
# (which are derived from a source_property and mapped one-hot), these are
# emitted once per scrape cycle for every configured BMC and always carry the
# full exporter identity dimensions. hw.bmc.up is the
# Prometheus-style `up` signal: 1 when the BMC scrape succeeds, 0 when it fails
# (connection error, timeout, auth failure, or a non-2xx ServiceRoot). Emitting
# 0 on failure — instead of skipping the host — lets a dashboard tell an
# UNREACHABLE BMC apart from MISSING telemetry (no series at all); issue #402.
# hw.build_info stays 1 in both states because it describes the exporter build,
# while its commit label lets the deployment gate detect old or missing builds.
scrape_health_signals:
  - metric: hw.bmc.up
    metric_type: gauge
    reachable_value: 1
    unreachable_value: 0
  - metric: hw.build_info
    metric_type: gauge
    reachable_value: 1
    unreachable_value: 1

allowlists:
  health: [ok, warning, critical, unknown]
  state: [enabled, disabled, standby_offline, standby_spare, in_test, starting,
          absent, unavailable_offline, deferring, quiesced, updating, qualified,
          unknown]
  # reason/reset_type allowlists grow via PR when a corpus shows a new vendor
  # value; anything outside the list maps to "other".
  reason: [peer_reset_event, other]
  reset_type: [pf_flr, conventional, fundamental, other]
