name: CI

# Offline test + lint gate. Runs on pushes to main and on every PR.
# It never talks to a BMC, uses no secrets, and does not publish anything —
# tests are offline by design and auto-skip live (@pytest.mark.live) cases.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  # Cancel a PR's in-progress run when a newer commit is pushed, so a burst of
  # commits does not stack full pipelines. Pushes to main always run to
  # completion (every landed commit is tested).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Single Python version: the floor (setup.py python_requires>=3.10), which
        # catches use of newer-than-3.10 syntax. main's branch protection must
        # require ONLY `test (3.10)`; if it still requires test (3.11)/test (3.12),
        # a PR hangs on checks that no longer run.
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v5
        with:
          # The offline suite extracts the LFS-tracked vendor corpus tarballs
          # (tests/*_corpus.tar.gz), so their objects must be fetched. The
          # tarballs are small (a few hundred KB each).
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (runtime + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Detect docs-only change
        # A PR that touches ONLY docs/ and Markdown files skips the full suite
        # below and runs just the docs-coupled tests instead. Anything else —
        # including push events, where the base diff is not fetched — runs the
        # full suite. Step-level (not job/workflow-level) so the required
        # check names always report and branch protection is never left pending.
        id: changes
        if: github.event_name == 'pull_request'
        run: |
          # Fail safe: if the base fetch or diff fails (e.g. merge-base beyond
          # the shallow fetch), fall through to the full suite.
          git fetch --no-tags --depth=200 origin "${{ github.base_ref }}" || true
          changed="$(git diff --name-only FETCH_HEAD...HEAD 2>/dev/null || true)"
          echo "$changed"
          if [ -n "$changed" ] && ! echo "$changed" | grep -qvE '^docs/|\.md$'; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Offline tests (no BMC, no IDRAC_IP)
        if: steps.changes.outputs.docs_only != 'true'
        run: pytest -q
      - name: Offline tests (docs-only fast path — docs-coupled tests)
        # Docs edits can still break tests that read docs/ or any Markdown
        # file (path links, Makefile/docker doc contracts, simulator-contract
        # references), so run exactly those instead of the whole suite. The
        # set is discovered by grep over every test module, so a new
        # docs-reading test is picked up automatically; if a shared fixture
        # module (conftest or a helper) ever becomes docs-coupled, fall back
        # to the full suite rather than guess.
        if: steps.changes.outputs.docs_only == 'true'
        run: |
          if grep -qlE '\bdocs/|\.md\b' tests/conftest.py tests/test_utils.py tests/vendor_corpus.py 2>/dev/null; then
            echo "shared test helper is docs-coupled; running the full suite"
            pytest -q
            exit 0
          fi
          files="$(grep -rlE '\bdocs/|\.md\b' tests/test_*.py || true)"
          if [ -n "$files" ]; then
            # shellcheck disable=SC2086
            pytest -q $files
          else
            echo "no docs-coupled tests detected"
          fi
      - name: Lint changed-file hygiene (informational)
        # The tree carries pre-existing ruff debt, so lint is reported but does
        # not fail the build. New code should still be clean.
        run: ruff check redfish_ctl || true
      - name: Docstring hard gate (diff-aware — new/changed methods)
        # Diff-aware and BLOCKING: shows a targeted failure for the functions
        # this PR adds or changes (each needs a docstring with :param: per arg
        # and :return:; see TEAM_GUIDE.md). Kept for friendly per-PR messages.
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=200 origin "${{ github.base_ref }}"
          python tools/docstring_gate.py --base FETCH_HEAD
      - name: Docstring hard gate (whole tree — no method anywhere may lack docs)
        # BLOCKING on every push and PR. The whole-tree backlog (redfish_ctl and
        # k8s) was backfilled to zero, so this keeps the entire package
        # permanently documented: any regression — a new undocumented method OR a
        # docstring deleted from an existing one — fails CI, not just the diff.
        run: python tools/docstring_gate.py --all
