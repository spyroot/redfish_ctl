# Build + push the CI toolchain image (docker/Dockerfile.ci) to GHCR. This image bakes the gate tools
# (gitleaks/shellcheck/helm/kubeconform/kube-linter) so the merge-profile gates can run. It publishes
# to ghcr.io/spyroot/redfish-ctl-ci using the built-in GITHUB_TOKEN (packages: write) — no extra secret.
# The build runs in GitHub Actions, never on the operator laptop.
name: ci-image

on:
  workflow_dispatch: {}            # operator-triggered
  push:
    branches: [main]
    paths: ['docker/Dockerfile.ci', '.github/workflows/ci-image.yml']

concurrency:
  group: ci-image
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/spyroot/redfish-ctl-ci:latest
            ghcr.io/spyroot/redfish-ctl-ci:${{ github.sha }}
