name: Release

# Publishes redfish_ctl to PyPI when a version tag is pushed.
#
# SAFETY — what this does and does NOT do:
#   * Triggers ONLY on tags matching v* (e.g. v1.1.2). A normal push to main
#     never publishes.
#   * Refuses to publish unless the tag matches redfish_ctl/version.py, so a
#     forgotten bump or a duplicate version fails loudly before upload.
#   * Publishes via PyPI Trusted Publishing (OIDC) — no API token is stored in
#     the repo, and PyPI records a verified link back to this workflow/repo
#     (fixes the "Unverified details" notice on the project page).
#   * Only the main redfish_ctl package is automated here. The one-off idrac_ctl
#     deprecation shim (packaging/idrac_ctl_deprecation/) is published manually.
#
# One-time setup on PyPI (Project -> Settings -> Publishing -> Add trusted
# publisher): owner "spyroot", repo "redfish_ctl", workflow "release.yml".

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Verify tag matches redfish_ctl/version.py
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(python -c "import re;print(re.search(r'''__version__\s*=\s*['\"]([^'\"]+)''', open('redfish_ctl/version.py').read()).group(1))")"
          echo "tag=$TAG  version.py=$FILE"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag v$TAG does not match redfish_ctl/version.py ($FILE). Refusing to publish."
            exit 1
          fi
      - name: Build and check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for Trusted Publishing; no stored token
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release and attach artifacts
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  docker-publish:
    # Publishes the production image to DockerHub + GHCR on the same v* tag.
    # Guarded: skips cleanly until docker/Dockerfile exists, so tag releases
    # made before the production image lands do not fail this job.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v5
      - name: Check for production Dockerfile
        id: gate
        run: |
          if [ -f docker/Dockerfile ]; then echo "go=1" >> "$GITHUB_OUTPUT"; else
            echo "::notice::docker/Dockerfile not present yet; skipping image publish."
            echo "go=0" >> "$GITHUB_OUTPUT"; fi
      - name: Resolve version from tag
        if: steps.gate.outputs.go == '1'
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v4
        if: steps.gate.outputs.go == '1'
      - uses: docker/setup-buildx-action@v4
        if: steps.gate.outputs.go == '1'
      - name: Log in to DockerHub
        if: steps.gate.outputs.go == '1'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        if: steps.gate.outputs.go == '1'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (multi-arch)
        if: steps.gate.outputs.go == '1'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/redfish-ctl:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/redfish-ctl:latest
            ghcr.io/${{ github.repository_owner }}/redfish-ctl:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/redfish-ctl:latest
      - name: Build and push controller image (multi-arch)
        # The Kubernetes controller image consumed by the Helm chart and the
        # k8s/controller/ manifests. Gated the same way: skips until the
        # Dockerfile exists so older tags cannot fail this job.
        if: steps.gate.outputs.go == '1' && hashFiles('docker/Dockerfile.controller') != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/redfish-ctl-controller:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/redfish-ctl-controller:latest
            ghcr.io/${{ github.repository_owner }}/redfish-ctl-controller:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/redfish-ctl-controller:latest
      - name: Build and push mock-BMC image (multi-arch)
        # The corpus-serving mock BMC used by the sandbox and the Helm chart's
        # mockBmc.enabled toggle. Contains only the already-public committed
        # test corpus; no credentials.
        if: steps.gate.outputs.go == '1' && hashFiles('docker/Dockerfile.mock-bmc') != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.mock-bmc
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/redfish-ctl-mock-bmc:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/redfish-ctl-mock-bmc:latest
            ghcr.io/${{ github.repository_owner }}/redfish-ctl-mock-bmc:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/redfish-ctl-mock-bmc:latest
