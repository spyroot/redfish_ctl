name: Release

# Publishes redfish_ctl to PyPI when a version tag is pushed.
#
# SAFETY — what this does and does NOT do:
#   * Triggers ONLY on tags matching v* (e.g. v1.1.2). A normal push to main
#     never publishes.
#   * Refuses to publish unless the tag matches redfish_ctl/version.py, so a
#     forgotten bump or a duplicate version fails loudly before upload.
#   * Publishes via PyPI Trusted Publishing (OIDC) — no API token is stored in
#     the repo, and PyPI records a verified link back to this workflow/repo
#     (fixes the "Unverified details" notice on the project page).
#   * Only the main redfish_ctl package is automated here. The one-off idrac_ctl
#     deprecation shim (packaging/idrac_ctl_deprecation/) is published manually.
#
# One-time setup on PyPI (Project -> Settings -> Publishing -> Add trusted
# publisher): owner "spyroot", repo "redfish_ctl", workflow "release.yml".

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Verify tag matches redfish_ctl/version.py
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(python -c "import re;print(re.search(r'''__version__\s*=\s*['\"]([^'\"]+)''', open('redfish_ctl/version.py').read()).group(1))")"
          echo "tag=$TAG  version.py=$FILE"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag v$TAG does not match redfish_ctl/version.py ($FILE). Refusing to publish."
            exit 1
          fi
      - name: Build and check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for Trusted Publishing; no stored token
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release and attach artifacts
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
