apiVersion: apps/v1
kind: Deployment
metadata:
  name: redfish-endpoint-controller
  namespace: redfish-sandbox
  labels:
    app.kubernetes.io/name: redfish-endpoint-controller
    app.kubernetes.io/component: redfish-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redfish-endpoint-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redfish-endpoint-controller
        app.kubernetes.io/component: redfish-sandbox
    spec:
      serviceAccountName: redfish-endpoint-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: controller
          image: redfish-ctl-controller:local
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --standalone
            # Watch only this namespace: the RBAC grant is a namespaced Role,
            # so a cluster-wide watch would be rejected with 403s.
            - --namespace=redfish-sandbox
            # Both controllers run in one kopf process: the endpoint controller
            # polls read status, the node-profile controller drives the gated
            # plan/approve/apply write path.
            - /app/k8s/controller/redfish_endpoint_controller.py
            - /app/k8s/controller/redfish_node_profile_controller.py
          env:
            # Base cadence for the endpoint controller's poll timer. Per-CR
            # spec.pollInterval slows individual endpoints below this floor.
            # (Helm renders the same var from .Values.controller.pollInterval.)
            - name: REDFISH_CONTROLLER_POLL_INTERVAL
              value: "30s"
            # Opt-in controller reconcile spans. OTLP endpoint and protocol are
            # supplied through the standard OTEL_EXPORTER_OTLP_* env vars.
            - name: REDFISH_CONTROLLER_OTLP_TRACES
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
