apiVersion: apps/v1
kind: Deployment
metadata:
  name: redfish-endpoint-controller
  namespace: redfish-sandbox
  labels:
    app.kubernetes.io/name: redfish-endpoint-controller
    app.kubernetes.io/component: redfish-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redfish-endpoint-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redfish-endpoint-controller
        app.kubernetes.io/component: redfish-sandbox
    spec:
      serviceAccountName: redfish-endpoint-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: controller
          image: redfish-ctl-controller:local
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --standalone
            # Watch only this namespace: the RBAC grant is a namespaced Role,
            # so a cluster-wide watch would be rejected with 403s.
            - --namespace=redfish-sandbox
            - /app/k8s/controller/redfish_endpoint_controller.py
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
