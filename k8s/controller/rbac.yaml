apiVersion: v1
kind: ServiceAccount
metadata:
  name: redfish-endpoint-controller
  namespace: redfish-sandbox
  labels:
    app.kubernetes.io/name: redfish-endpoint-controller
    app.kubernetes.io/component: redfish-sandbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redfish-endpoint-controller
  namespace: redfish-sandbox
  labels:
    app.kubernetes.io/name: redfish-endpoint-controller
    app.kubernetes.io/component: redfish-sandbox
rules:
  - apiGroups:
      - redfish.ctl.dev
    resources:
      - redfishendpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - redfish.ctl.dev
    resources:
      - redfishendpoints/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redfish-endpoint-controller
  namespace: redfish-sandbox
  labels:
    app.kubernetes.io/name: redfish-endpoint-controller
    app.kubernetes.io/component: redfish-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redfish-endpoint-controller
subjects:
  - kind: ServiceAccount
    name: redfish-endpoint-controller
    namespace: redfish-sandbox
