apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: redfishnodeprofiles.redfish.ctl.dev
spec:
  group: redfish.ctl.dev
  scope: Namespaced
  names:
    plural: redfishnodeprofiles
    singular: redfishnodeprofile
    kind: RedfishNodeProfile
    shortNames:
      - rnp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - endpoint
                - desiredState
              properties:
                endpoint:
                  type: object
                  required:
                    - address
                  properties:
                    address:
                      type: string
                      minLength: 1
                      description: BMC hostname, IP address, or URL for the Redfish ServiceRoot.
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 443
                      description: TCP port for the Redfish endpoint.
                    insecure:
                      type: boolean
                      default: true
                      description: Skip TLS certificate verification for self-signed BMC certificates.
                    secretRef:
                      type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                          minLength: 1
                          description: Secret in the same namespace containing BMC login data.
                        usernameKey:
                          type: string
                          default: username
                          description: Secret data key containing the BMC username.
                        passwordKey:
                          type: string
                          default: password
                          description: Secret data key containing the BMC password.
                      additionalProperties: false
                  additionalProperties: false
                desiredState:
                  type: object
                  properties:
                    biosProfile:
                      type: string
                      nullable: true
                      description: Named BIOS profile to diff or stage through the reconciler.
                    ntp:
                      type: object
                      properties:
                        servers:
                          type: array
                          items:
                            type: string
                          maxItems: 4
                        managerId:
                          type: string
                          nullable: true
                      additionalProperties: false
                    boot:
                      type: object
                      properties:
                        device:
                          type: string
                          nullable: true
                        mode:
                          type: string
                          nullable: true
                        uefiTarget:
                          type: string
                          nullable: true
                      additionalProperties: false
                    reboot:
                      type: object
                      properties:
                        resetType:
                          type: string
                          nullable: true
                      additionalProperties: false
                  additionalProperties: false
                approve:
                  type: boolean
                  default: false
                  description: Required approval gate before any desired-state changes are applied.
                waitForReboot:
                  type: boolean
                  default: false
                  description: Wait for the BMC to answer again after an approved reboot step.
              additionalProperties: false
            status:
              type: object
              properties:
                dryRun:
                  type: boolean
                drift:
                  type: boolean
                  nullable: true
                plannedSteps:
                  type: array
                  items:
                    type: object
                    required:
                      - kind
                      - required
                      - description
                    properties:
                      kind:
                        type: string
                      required:
                        type: boolean
                      description:
                        type: string
                      preview:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    additionalProperties: false
                appliedChanges:
                  type: array
                  items:
                    type: object
                    required:
                      - kind
                      - changed
                    properties:
                      kind:
                        type: string
                      changed:
                        type: boolean
                      result:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    additionalProperties: false
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                    additionalProperties: false
                lastReconciled:
                  type: string
                  format: date-time
              additionalProperties: false
