apiVersion: apps/v1
kind: Deployment
metadata:
  name: redfish-fleet-consumer
  namespace: redfish-sandbox
  labels:
    app.kubernetes.io/name: redfish-fleet-consumer
    app.kubernetes.io/component: redfish-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redfish-fleet-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redfish-fleet-consumer
        app.kubernetes.io/component: redfish-sandbox
    spec:
      serviceAccountName: redfish-fleet-consumer
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: consumer
          image: redfish-ctl-consumer:local
          imagePullPolicy: IfNotPresent
          env:
            # Namespace whose RedfishEndpoint status the dashboard reads.
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BIND_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redfish-fleet-consumer
  namespace: redfish-sandbox
  labels:
    app.kubernetes.io/name: redfish-fleet-consumer
    app.kubernetes.io/component: redfish-sandbox
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redfish-fleet-consumer
  ports:
    - name: http
      port: 80
      targetPort: http
